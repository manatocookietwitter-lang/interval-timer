<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>インターバルタイマー</title>

  <style>
    :root {
      --bg: #f7fbff;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #dbe4f1;
      --blue: #2563eb;
      --blueWeak: #eff6ff;
      --green: #22c55e;
      --greenWeak: #ecfdf5;
      --orange: #f97316;
      --orangeWeak: #fff7ed;
      --red: #ef4444;
      --shadow: 0 12px 30px rgba(37, 99, 235, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-text-size-adjust: 100%;
      -webkit-overflow-scrolling: touch;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    input {
      -webkit-tap-highlight-color: transparent;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 14px) 12px calc(env(safe-area-inset-bottom) + 80px);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 0 10px;
      margin-bottom: 10px;
      background: linear-gradient(180deg, rgba(247, 251, 255, .96), rgba(247, 251, 255, .88));
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 11px;
      color: var(--blue);
      font-weight: 900;
      letter-spacing: .06em;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    h3 {
      margin: 0;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .hidden {
      display: none !important;
    }

    .panel,
    .home-saved-button,
    .mock-phone-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .panel,
    .mock-phone-card {
      width: 100%;
      padding: 16px;
      margin-bottom: 14px;
    }

    .mock-phone-card {
      border-radius: 28px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, .10);
    }

    .home-title-row {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: 16px;
    }

    .home-title-row h2 {
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .setting-row {
      width: 100%;
      display: grid;
      grid-template-columns: 36px 1fr auto 14px;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 8px 10px;
      border: 1px solid #dfe7f3;
      border-radius: 13px;
      background: #ffffff;
      box-shadow: 0 3px 10px rgba(15, 23, 42, .035);
      text-align: left;
    }

    .row-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      color: #ffffff;
      font-size: 17px;
      font-weight: 900;
    }

    .blue-icon {
      background: #3b82f6;
    }

    .green-icon {
      background: #43bf5f;
    }

    .orange-icon {
      background: #f58220;
    }

    .row-label {
      font-size: 15px;
      font-weight: 900;
      color: #111827;
    }

    .row-value {
      font-size: 15px;
      font-weight: 900;
      color: #111827;
    }

    .chev {
      color: #6b7280;
      font-size: 22px;
      line-height: 1;
    }

    .big-start {
      width: 100%;
      min-height: 66px;
      margin-top: 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      color: #ffffff;
      font-size: 23px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(37, 99, 235, .26);
    }

    .home-saved-button {
      width: 100%;
      min-height: 52px;
      display: grid;
      grid-template-columns: 38px 1fr auto 16px;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      padding: 9px 10px;
      text-align: left;
      background: #ffffff;
    }

    .home-saved-button .row-icon {
      width: 34px;
      height: 34px;
    }

    .home-saved-button small {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label span {
      color: var(--muted);
      font-weight: 800;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fbfdff;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      width: 100%;
      min-height: 54px;
      border: none;
      border-radius: 16px;
      padding: 13px 16px;
      font-weight: 900;
      font-size: 16px;
    }

    .primary {
      background: var(--blue);
      color: white;
    }

    .secondary {
      background: var(--blueWeak);
      color: var(--blue);
    }

    .ghost {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .danger {
      background: #fee2e2;
      color: #b91c1c;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px;
      background: #fcfdff;
    }

    .item-title {
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .small-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .small {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      padding: 9px 8px;
      font-size: 13.5px;
      font-weight: 900;
    }

    .small.blue {
      background: var(--blueWeak);
      color: var(--blue);
      border-color: transparent;
    }

    .small.green {
      background: var(--greenWeak);
      color: #15803d;
      border-color: transparent;
    }

    .small.red {
      background: #fff1f2;
      color: #be123c;
      border-color: transparent;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 16px;
      background: #fbfdff;
      color: var(--muted);
      text-align: center;
      font-weight: 800;
    }

    .edit-banner {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.45;
    }

    .edit-banner .edit-title {
      display: block;
      margin-bottom: 4px;
      color: #c2410c;
      font-size: 15px;
    }

    .two-actions {
      grid-template-columns: 1fr 1fr;
    }

    .combo-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .mini-head {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 900;
    }

    #availableList .item {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      align-items: center;
      column-gap: 8px;
      row-gap: 3px;
      padding: 8px 10px;
      min-height: 58px;
    }

    #availableList .item-title {
      grid-column: 1;
      grid-row: 1;
      margin-bottom: 0;
      font-size: 15px;
      line-height: 1.25;
    }

    #availableList .metrics {
      grid-column: 1;
      grid-row: 2;
      font-size: 12px;
      gap: 4px 8px;
      line-height: 1.25;
    }

    #availableList .small-actions {
      grid-column: 2;
      grid-row: 1 / span 2;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 0;
    }

    #availableList .small-actions .small {
      min-width: 56px;
      min-height: 36px;
      padding: 7px 9px;
    }

    .combo-total {
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      background: #f3f4f6;
      font-weight: 900;
      text-align: center;
      color: #111827;
    }

    .combo-total span {
      color: var(--blue);
      font-size: 18px;
    }

    .run-head {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tag {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--blueWeak);
      color: var(--blue);
      font-weight: 900;
    }

    .ring-wrap {
      display: flex;
      justify-content: center;
      margin: 12px 0 18px;
    }

    .ring {
      --progress: 0;
      --phaseColor: var(--green);
      width: min(82vw, 330px);
      height: min(82vw, 330px);
      border-radius: 50%;
      background: conic-gradient(var(--phaseColor) calc(var(--progress) * 1%), #e6eef9 0%);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .ring-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: white;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
    }

    .phase {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .08em;
    }

    .time {
      font-size: clamp(56px, 17vw, 76px);
      font-weight: 900;
      line-height: 1;
    }

    .step {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .info {
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .info span {
      display: block;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .info strong {
      font-size: 18px;
    }

    .upcoming-menus {
      margin-top: 10px;
    }

    .upcoming-title {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .upcoming-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .upcoming-list span {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #111827;
      font-size: 13px;
      font-weight: 800;
    }

    .page-head-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
  </style>
  <meta name="description" content="スマホで使えるインターバルタイマー" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/timer-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/timer-192.png" />
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">SMARTPHONE TIMER</p>
        <h1>インターバルタイマー</h1>
      </div>
      <button id="homeBtn" class="btn ghost hidden">ホーム</button>
    </header>

    <main>
      <section id="home" class="view active">
        <div class="mock-phone-card">
          <div class="home-title-row">
            <h2>インターバルタイマー</h2>
          </div>

          <div class="menu-list">
            <button class="setting-row" data-view="quick">
              <span class="row-icon blue-icon">▶</span>
              <span class="row-label">クイック開始</span>
              <span class="row-value">開始</span>
              <span class="chev">›</span>
            </button>

            <button class="setting-row" data-view="menu">
              <span class="row-icon green-icon">✎</span>
              <span class="row-label">メニュー作成</span>
              <span class="row-value"><span id="blockCount">0</span>件</span>
              <span class="chev">›</span>
            </button>

            <button class="setting-row" data-view="combo">
              <span class="row-icon orange-icon">☰</span>
              <span class="row-label">組み合わせ</span>
              <span class="row-value"><span id="comboCount">0</span>件</span>
              <span class="chev">›</span>
            </button>
          </div>

          <button class="big-start" data-view="quick">▶ クイック開始</button>
        </div>

        <button class="home-saved-button" data-view="savedMenus">
          <span class="row-icon green-icon">✓</span>
          <span class="row-label">保存済みメニュー</span>
          <small><span id="homeSavedMenuCount">0</span>件</small>
          <span class="chev">›</span>
        </button>

        <button class="home-saved-button" data-view="savedCombos">
          <span class="row-icon orange-icon">★</span>
          <span class="row-label">保存済み組み合わせ</span>
          <small><span id="homeSavedComboCount">0</span>件</small>
          <span class="chev">›</span>
        </button>
      </section>

      <section id="quick" class="view">
        <div class="panel">
          <div class="section-head">
            <h2>クイック開始</h2>
          </div>

          <div class="form-grid">
            <label>
              <span>Work（秒）</span>
              <input id="quickWork" type="number" min="1" value="40">
            </label>

            <label>
              <span>Rest（秒）</span>
              <input id="quickRest" type="number" min="1" value="20">
            </label>

            <label>
              <span>回数</span>
              <input id="quickRepeat" type="number" min="1" value="8">
            </label>

            <label>
              <span>セット名（任意）</span>
              <input id="quickName" placeholder="例：HIIT">
            </label>
          </div>

          <div class="actions">
            <button id="quickStart" class="btn primary">開始</button>
            <button id="quickSave" class="btn secondary">保存</button>
          </div>
        </div>
      </section>

      <section id="menu" class="view">
        <div class="panel">
          <div class="section-head">
            <h2>メニュー作成</h2>
          </div>

          <div id="menuEditBanner" class="edit-banner hidden"></div>

          <div class="form-grid">
            <label>
              <span>メニュー名</span>
              <input id="menuName" placeholder="例：ウォームアップ">
            </label>

            <label>
              <span>Work（秒）</span>
              <input id="menuWork" type="number" min="1" value="30">
            </label>

            <label>
              <span>Rest（秒）</span>
              <input id="menuRest" type="number" min="1" value="15">
            </label>

            <label>
              <span>回数</span>
              <input id="menuRepeat" type="number" min="1" value="4">
            </label>
          </div>

          <div class="actions two-actions">
            <button id="menuSave" class="btn primary">保存</button>
            <button id="menuCancelEdit" class="btn ghost hidden">編集を解除</button>
          </div>
        </div>

        <div class="panel">
          <div class="section-head">
            <h3>保存済みメニュー</h3>
          </div>
          <div id="menuList" class="list"></div>
        </div>
      </section>

      <section id="combo" class="view">
        <div class="panel">
          <div class="section-head">
            <h2>組み合わせ作成</h2>
          </div>

          <div id="comboEditBanner" class="edit-banner hidden"></div>

          <div class="form-grid">
            <label>
              <span>組み合わせ名</span>
              <input id="comboName" placeholder="例：今日のメニュー">
            </label>
          </div>

          <div class="combo-layout">
            <div>
              <h3 class="mini-head">追加するメニュー</h3>
              <div id="availableList" class="list"></div>
            </div>

            <div>
              <h3 class="mini-head">現在の組み合わせ</h3>
              <div id="builderList" class="list"></div>
              <div id="comboTotal" class="combo-total">合計 <span>00:00</span></div>

              <div class="actions">
                <button id="comboSave" class="btn primary">組み合わせを保存</button>
                <button id="comboStart" class="btn secondary">このまま開始</button>
                <button id="comboClear" class="btn ghost">クリア</button>
              </div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="section-head">
            <h3>保存済み組み合わせ</h3>
          </div>
          <div id="savedComboList" class="list"></div>
        </div>
      </section>

      <section id="savedMenus" class="view">
        <div class="panel">
          <div class="section-head">
            <h2>保存済みメニュー</h2>
          </div>

          <div class="page-head-actions">
            <button class="btn primary" data-view="menu">メニューを作成</button>
          </div>

          <div id="savedMenuPageList" class="list"></div>
        </div>
      </section>

      <section id="savedCombos" class="view">
        <div class="panel">
          <div class="section-head">
            <h2>保存済み組み合わせ</h2>
          </div>

          <div class="page-head-actions">
            <button class="btn primary" data-view="combo">組み合わせを作成</button>
          </div>

          <div id="savedComboPageList" class="list"></div>
        </div>
      </section>

      <section id="run" class="view">
        <div class="panel">
          <div class="run-head">
            <div>
              <p class="eyebrow">実行中</p>
              <h2 id="runTitle">インターバル</h2>
            </div>
            <span id="blockNameTag" class="tag">-</span>
          </div>

          <div class="ring-wrap">
            <div id="ring" class="ring">
              <div class="ring-inner">
                <p id="phase" class="phase">WORK</p>
                <div id="time" class="time">00:40</div>
                <p id="step" class="step">1 / 16</p>
              </div>
            </div>
          </div>

          <div class="info-grid">
            <div class="info">
              <span>次</span>
              <strong id="next">REST 00:20</strong>
            </div>

            <div class="info">
              <span>全体残り</span>
              <strong id="totalLeft">00:00</strong>
            </div>
          </div>

          <div class="actions run-actions">
            <button id="pause" class="btn secondary">一時停止</button>
            <button id="skip" class="btn ghost">スキップ</button>
            <button id="stop" class="btn danger">終了</button>
          </div>

          <div id="upcomingMenus" class="upcoming-menus"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const store = {
      blocks: 'interval_blocks_single_v2',
      combos: 'interval_combos_single_v2'
    };

    const legacyStore = {
      blocks: 'interval_blocks_single_v1',
      combos: 'interval_combos_single_v1'
    };

    const state = {
      blocks: load(store.blocks, load(legacyStore.blocks, [])),
      combos: load(store.combos, load(legacyStore.combos, [])),
      builder: [],
      editingBlockId: null,
      editingComboId: null,
      timer: {
        active: false,
        paused: false,
        title: '',
        steps: [],
        index: 0,
        remaining: 0,
        duration: 0,
        totalLeft: 0,
        id: null,
        beeped: null
      }
    };

    const el = {
      homeBtn: $('homeBtn'),
      blockCount: $('blockCount'),
      comboCount: $('comboCount'),
      homeSavedMenuCount: $('homeSavedMenuCount'),
      homeSavedComboCount: $('homeSavedComboCount'),

      quickWork: $('quickWork'),
      quickRest: $('quickRest'),
      quickRepeat: $('quickRepeat'),
      quickName: $('quickName'),

      menuName: $('menuName'),
      menuWork: $('menuWork'),
      menuRest: $('menuRest'),
      menuRepeat: $('menuRepeat'),
      menuSave: $('menuSave'),
      menuCancelEdit: $('menuCancelEdit'),
      menuEditBanner: $('menuEditBanner'),

      menuList: $('menuList'),
      savedMenuPageList: $('savedMenuPageList'),

      availableList: $('availableList'),
      builderList: $('builderList'),
      savedComboList: $('savedComboList'),
      savedComboPageList: $('savedComboPageList'),
      comboName: $('comboName'),
      comboSave: $('comboSave'),
      comboTotal: $('comboTotal'),
      comboEditBanner: $('comboEditBanner'),

      runTitle: $('runTitle'),
      blockNameTag: $('blockNameTag'),
      ring: $('ring'),
      phase: $('phase'),
      time: $('time'),
      step: $('step'),
      next: $('next'),
      totalLeft: $('totalLeft'),
      pause: $('pause')
    };

    document.querySelectorAll('[data-view]').forEach((btn) => {
      btn.addEventListener('click', () => show(btn.dataset.view));
    });

    el.homeBtn.addEventListener('click', () => show('home'));

    $('quickStart').addEventListener('click', quickStart);
    $('quickSave').addEventListener('click', quickSave);
    $('menuSave').addEventListener('click', saveMenu);
    $('menuCancelEdit').addEventListener('click', clearMenuEdit);
    $('comboSave').addEventListener('click', saveCombo);
    $('comboStart').addEventListener('click', startBuilder);
    $('comboClear').addEventListener('click', clearComboBuilder);
    $('pause').addEventListener('click', pauseToggle);
    $('skip').addEventListener('click', () => nextStep(true));
    $('stop').addEventListener('click', () => stop(false));

    render();

    function show(id) {
      document.querySelectorAll('.view').forEach((v) => v.classList.remove('active'));
      $(id).classList.add('active');
      el.homeBtn.classList.toggle('hidden', id === 'home' || id === 'run');
      window.scrollTo({ top: 0, behavior: 'auto' });
    }

    function render() {
      el.blockCount.textContent = state.blocks.length;
      el.comboCount.textContent = state.combos.length;
      el.homeSavedMenuCount.textContent = state.blocks.length;
      el.homeSavedComboCount.textContent = state.combos.length;

      renderMenus();
      renderSavedMenuPage();
      renderAvailable();
      renderBuilder();
      renderCombos();
      renderSavedComboPage();
      updateMenuEditUI();
      updateComboEditUI();
      updateComboTotal();

      saveBlocks();
      saveCombos();
    }

    function blockFromQuick() {
      return {
        id: crypto.randomUUID(),
        name: el.quickName.value.trim() || 'クイック開始',
        work: num(el.quickWork.value, 40),
        rest: num(el.quickRest.value, 20),
        repeat: num(el.quickRepeat.value, 8)
      };
    }

    function quickStart() {
      const block = blockFromQuick();
      start([block], block.name);
    }

    function quickSave() {
      state.blocks.push(blockFromQuick());
      saveBlocks();
      render();
      show('savedMenus');
    }

    function menuFormBlock(id = crypto.randomUUID()) {
      return {
        id,
        name: el.menuName.value.trim() || `メニュー ${state.blocks.length + 1}`,
        work: num(el.menuWork.value, 30),
        rest: num(el.menuRest.value, 15),
        repeat: num(el.menuRepeat.value, 4)
      };
    }

    function saveMenu() {
      if (state.editingBlockId) {
        const index = state.blocks.findIndex((b) => b.id === state.editingBlockId);
        if (index >= 0) {
          state.blocks[index] = menuFormBlock(state.editingBlockId);
          updateCombosAfterBlockEdit(state.blocks[index]);
        }
        clearMenuEdit(false);
      } else {
        state.blocks.push(menuFormBlock());
        clearMenuForm();
      }

      saveBlocks();
      saveCombos();
      render();
      show('savedMenus');
    }

    function editBlock(id) {
      const block = state.blocks.find((b) => b.id === id);
      if (!block) return;

      state.editingBlockId = id;
      el.menuName.value = block.name;
      el.menuWork.value = block.work;
      el.menuRest.value = block.rest;
      el.menuRepeat.value = block.repeat;

      render();
      show('menu');
    }

    function clearMenuForm() {
      el.menuName.value = '';
      el.menuWork.value = 30;
      el.menuRest.value = 15;
      el.menuRepeat.value = 4;
    }

    function clearMenuEdit(shouldRender = true) {
      state.editingBlockId = null;
      clearMenuForm();
      if (shouldRender) render();
    }

    function updateMenuEditUI() {
      if (state.editingBlockId) {
        const block = state.blocks.find((b) => b.id === state.editingBlockId);
        el.menuEditBanner.classList.remove('hidden');
        el.menuEditBanner.innerHTML =
          `<span class="edit-title">編集中</span>${block ? block.name : 'メニュー'} を編集しています。変更後は「変更を保存」を押してください。`;
        el.menuSave.textContent = '変更を保存';
        el.menuCancelEdit.classList.remove('hidden');
      } else {
        el.menuEditBanner.classList.add('hidden');
        el.menuEditBanner.innerHTML = '';
        el.menuSave.textContent = '保存';
        el.menuCancelEdit.classList.add('hidden');
      }
    }

    function updateCombosAfterBlockEdit(updatedBlock) {
      if (!updatedBlock) return;

      state.combos = state.combos.map((combo) => ({
        ...combo,
        blocks: combo.blocks.map((block) =>
          block.id === updatedBlock.id ? { ...updatedBlock } : block
        )
      }));

      state.builder = state.builder.map((block) =>
        block.id === updatedBlock.id ? { ...updatedBlock } : block
      );
    }

    function deleteBlock(id) {
      if (!confirm('このメニューを削除しますか？')) return;

      state.blocks = state.blocks.filter((block) => block.id !== id);
      state.builder = state.builder.filter((block) => block.id !== id);

      state.combos = state.combos
        .map((combo) => ({
          ...combo,
          blocks: combo.blocks.filter((block) => block.id !== id)
        }))
        .filter((combo) => combo.blocks.length > 0);

      if (state.editingBlockId === id) {
        clearMenuEdit(false);
      }

      saveBlocks();
      saveCombos();
      render();
    }

    function moveSavedMenu(index, direction) {
      const nextIndex = index + direction;
      if (nextIndex < 0 || nextIndex >= state.blocks.length) return;

      [state.blocks[index], state.blocks[nextIndex]] =
        [state.blocks[nextIndex], state.blocks[index]];

      saveBlocks();
      render();
    }

    function menuCard(block, index) {
      return card(block.name, [`${block.work}秒 Work`, `${block.rest}秒 Rest`, `${block.repeat}回`], [
        btn('開始', 'blue', () => start([block], block.name)),
        btn('編集', '', () => editBlock(block.id)),
        btn('削除', 'red', () => deleteBlock(block.id)),
        btn('↑', '', () => moveSavedMenu(index, -1)),
        btn('↓', '', () => moveSavedMenu(index, 1))
      ]);
    }

    function renderMenus() {
      list(el.menuList, state.blocks, 'まだ保存されたメニューはありません。', menuCard);
    }

    function renderSavedMenuPage() {
      list(el.savedMenuPageList, state.blocks, 'まだ保存されたメニューはありません。', menuCard);
    }

    function renderAvailable() {
      list(el.availableList, state.blocks, '先にメニューを保存してください。', (block) =>
        card(block.name, [`${block.work}秒 Work`, `${block.rest}秒 Rest`, `${block.repeat}回`], [
          btn('追加', 'green', () => addBuilder(block.id))
        ])
      );
    }

    function addBuilder(id) {
      const block = state.blocks.find((b) => b.id === id);
      if (!block) return;

      state.builder.push({ ...block });
      render();
      show('combo');
    }

    function renderBuilder() {
      list(el.builderList, state.builder, 'ここにメニューを追加してください。', (block, index) =>
        card(`${index + 1}. ${block.name}`, [`${block.work}秒 Work`, `${block.rest}秒 Rest`, `${block.repeat}回`], [
          btn('↑', '', () => moveBuilder(index, -1)),
          btn('↓', '', () => moveBuilder(index, 1)),
          btn('削除', 'red', () => {
            state.builder.splice(index, 1);
            render();
          })
        ])
      );
    }

    function moveBuilder(index, direction) {
      const nextIndex = index + direction;
      if (nextIndex < 0 || nextIndex >= state.builder.length) return;

      [state.builder[index], state.builder[nextIndex]] =
        [state.builder[nextIndex], state.builder[index]];

      render();
    }

    function updateComboTotal() {
      const total = state.builder.reduce(
        (sum, block) => sum + (block.work + block.rest) * block.repeat,
        0
      );

      el.comboTotal.innerHTML = `合計 <span>${fmt(total)}</span>`;
    }

    function saveCombo() {
      if (!state.builder.length) {
        alert('組み合わせにメニューを追加してください。');
        return;
      }

      const name = el.comboName.value.trim() || `組み合わせ ${state.combos.length + 1}`;
      const blocks = state.builder.map((block) => ({ ...block }));

      if (state.editingComboId) {
        const combo = state.combos.find((c) => c.id === state.editingComboId);
        if (combo) {
          combo.name = name;
          combo.blocks = blocks;
        }
        clearComboEdit(false);
      } else {
        state.combos.push({
          id: crypto.randomUUID(),
          name,
          blocks
        });
        clearComboBuilder(false);
      }

      saveCombos();
      render();
      show('savedCombos');
    }

    function startBuilder() {
      if (!state.builder.length) {
        alert('組み合わせにメニューを追加してください。');
        return;
      }

      start(state.builder.map((block) => ({ ...block })), el.comboName.value.trim() || '組み合わせ実行');
    }

    function clearComboBuilder(shouldRender = true) {
      state.builder = [];
      state.editingComboId = null;
      el.comboName.value = '';

      if (shouldRender) render();
    }

    function editCombo(id) {
      const combo = state.combos.find((c) => c.id === id);
      if (!combo) return;

      state.editingComboId = id;
      state.builder = combo.blocks.map((block) => ({ ...block }));
      el.comboName.value = combo.name;

      render();
      show('combo');
    }

    function loadCombo(id) {
      const combo = state.combos.find((c) => c.id === id);
      if (!combo) return;

      state.editingComboId = null;
      state.builder = combo.blocks.map((block) => ({ ...block }));
      el.comboName.value = combo.name;

      render();
      show('combo');
    }

    function clearComboEdit(shouldRender = true) {
      state.editingComboId = null;
      state.builder = [];
      el.comboName.value = '';

      if (shouldRender) render();
    }

    function deleteCombo(id) {
      if (!confirm('この組み合わせを削除しますか？')) return;

      state.combos = state.combos.filter((combo) => combo.id !== id);

      if (state.editingComboId === id) {
        clearComboEdit(false);
      }

      saveCombos();
      render();
    }

    function updateComboEditUI() {
      if (state.editingComboId) {
        const combo = state.combos.find((c) => c.id === state.editingComboId);
        el.comboEditBanner.classList.remove('hidden');
        el.comboEditBanner.innerHTML =
          `<span class="edit-title">編集中</span>${combo ? combo.name : '組み合わせ'} を編集しています。変更後は「変更を保存」を押してください。`;
        el.comboSave.textContent = '変更を保存';
      } else {
        el.comboEditBanner.classList.add('hidden');
        el.comboEditBanner.innerHTML = '';
        el.comboSave.textContent = '組み合わせを保存';
      }
    }

    function comboCard(combo) {
      const total = combo.blocks.reduce(
        (sum, block) => sum + (block.work + block.rest) * block.repeat,
        0
      );

      return card(combo.name, [`${combo.blocks.length}メニュー`, `合計 ${fmt(total)}`, combo.blocks.map((block) => block.name).join(' / ')], [
        btn('開始', 'blue', () => start(combo.blocks, combo.name)),
        btn('編集', '', () => editCombo(combo.id)),
        btn('読込', '', () => loadCombo(combo.id)),
        btn('削除', 'red', () => deleteCombo(combo.id))
      ]);
    }

    function renderCombos() {
      list(el.savedComboList, state.combos, 'まだ保存された組み合わせはありません。', comboCard);
    }

    function renderSavedComboPage() {
      list(el.savedComboPageList, state.combos, 'まだ保存された組み合わせはありません。', comboCard);
    }

    function start(blocks, title) {
      const steps = [
        {
          phase: 'START',
          duration: 5,
          block: '準備'
        }
      ];

      blocks.forEach((block) => {
        for (let i = 0; i < block.repeat; i++) {
          steps.push({
            phase: 'WORK',
            duration: block.work,
            block: block.name
          });

          steps.push({
            phase: 'REST',
            duration: block.rest,
            block: block.name
          });
        }
      });

      clearInterval(state.timer.id);

      state.timer = {
        active: true,
        paused: false,
        title,
        steps,
        index: 0,
        remaining: steps[0].duration,
        duration: steps[0].duration,
        totalLeft: steps.reduce((sum, step) => sum + step.duration, 0),
        id: null,
        beeped: null
      };

      show('run');
      drawRun();
      state.timer.id = setInterval(tick, 250);
    }

    function tick() {
      const timer = state.timer;

      if (!timer.active || timer.paused) return;

      timer.remaining = Math.max(0, timer.remaining - 0.25);
      timer.totalLeft = Math.max(0, timer.totalLeft - 0.25);

      const second = Math.ceil(timer.remaining);

      if (second <= 3 && second >= 1 && timer.beeped !== second) {
        if (second === 1) {
          beep(880, 0.13, 'triangle');
        } else {
          beep(880, 0.13, 'triangle');
        }

        timer.beeped = second;
      }

      if (timer.remaining <= 0.001) {
        beep(660, 1.50, 'sine');
        nextStep(false);
        return;
      }

      drawRun();
    }

    function nextStep(fromSkip = false) {
      const timer = state.timer;

      if (fromSkip && timer.remaining > 0) {
        timer.totalLeft = Math.max(0, timer.totalLeft - timer.remaining);
      }

      timer.index += 1;
      timer.beeped = null;

      if (timer.index >= timer.steps.length) {
        stop(true);
        return;
      }

      timer.remaining = timer.steps[timer.index].duration;
      timer.duration = timer.steps[timer.index].duration;

      drawRun();
    }

    function pauseToggle() {
      const timer = state.timer;

      if (!timer.active) return;

      timer.paused = !timer.paused;
      el.pause.textContent = timer.paused ? '再開' : '一時停止';
    }

    function stop(done) {
      clearInterval(state.timer.id);

      if (done) {
        alert('メニューが完了しました。');
      }

      state.timer.active = false;
      state.timer.paused = false;
      el.pause.textContent = '一時停止';

      show('home');
      render();
    }

    function drawRun() {
      const timer = state.timer;
      const step = timer.steps[timer.index];

      if (!step) return;

      const isStart = step.phase === 'START';
      const isWork = step.phase === 'WORK';
      const progress = timer.duration
        ? ((timer.duration - timer.remaining) / timer.duration) * 100
        : 100;

      el.runTitle.textContent = timer.title;
      el.blockNameTag.textContent = step.block;
      el.phase.textContent = isStart ? 'START' : step.phase;
      el.phase.style.color = isStart
        ? 'var(--blue)'
        : isWork
          ? 'var(--green)'
          : 'var(--orange)';

      el.time.textContent = fmt(timer.remaining);
      el.step.textContent = isStart ? '準備' : `${timer.index} / ${timer.steps.length - 1}`;
      el.totalLeft.textContent = fmt(timer.totalLeft);

      el.ring.style.setProperty('--progress', progress.toFixed(2));
      el.ring.style.setProperty(
        '--phaseColor',
        isStart ? 'var(--blue)' : isWork ? 'var(--green)' : 'var(--orange)'
      );

      const next = timer.steps[timer.index + 1];
      el.next.textContent = next ? `${next.phase} ${fmt(next.duration)}` : '終了';

      drawUpcomingMenus();
    }

    function drawUpcomingMenus() {
      const root = $('upcomingMenus');

      if (!root) return;

      const timer = state.timer;
      const current = timer.steps[timer.index]?.block;
      const names = [];

      for (let i = timer.index + 1; i < timer.steps.length; i++) {
        const name = timer.steps[i].block;

        if (!name || name === '準備' || name === current) continue;
        if (!names.includes(name)) names.push(name);
      }

      if (!names.length) {
        root.innerHTML = '';
        return;
      }

      root.innerHTML =
        `<div class="upcoming-title">次以降のメニュー</div>` +
        `<div class="upcoming-list">${names.map((name) => `<span>${name}</span>`).join('')}</div>`;
    }

    function beep(freq, dur, type) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;

      if (!AudioContext) return;

      if (!window.audioCtx) {
        window.audioCtx = new AudioContext();
      }

      const ctx = window.audioCtx;

      if (ctx.state === 'suspended') {
        ctx.resume();
      }

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = type;
      osc.frequency.value = freq;

      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(1.00, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();
      osc.stop(ctx.currentTime + dur + 0.03);
    }

    function list(root, items, emptyText, builder) {
      root.innerHTML = '';

      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = emptyText;
        root.appendChild(empty);
        return;
      }

      items.forEach((item, index) => {
        root.appendChild(builder(item, index));
      });
    }

    function card(title, metrics, buttons) {
      const item = document.createElement('div');
      item.className = 'item';

      const titleEl = document.createElement('div');
      titleEl.className = 'item-title';
      titleEl.textContent = title;
      item.appendChild(titleEl);

      const metricsEl = document.createElement('div');
      metricsEl.className = 'metrics';

      metrics.filter(Boolean).forEach((metric) => {
        const span = document.createElement('span');
        span.textContent = metric;
        metricsEl.appendChild(span);
      });

      item.appendChild(metricsEl);

      const actions = document.createElement('div');
      actions.className = 'small-actions';

      buttons.forEach((button) => {
        actions.appendChild(button);
      });

      item.appendChild(actions);

      return item;
    }

    function btn(text, cls, fn) {
      const button = document.createElement('button');
      button.className = `small ${cls || ''}`;
      button.textContent = text;
      button.addEventListener('click', fn);
      return button;
    }

    function fmt(value) {
      const secondsTotal = Math.max(0, Math.ceil(value));
      const minutes = String(Math.floor(secondsTotal / 60)).padStart(2, '0');
      const seconds = String(secondsTotal % 60).padStart(2, '0');
      return `${minutes}:${seconds}`;
    }

    function num(value, fallback) {
      const parsed = parseInt(value, 10);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
    }

    function load(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key)) || fallback;
      } catch {
        return fallback;
      }
    }

    function saveBlocks() {
      localStorage.setItem(store.blocks, JSON.stringify(state.blocks));
    }

    function saveCombos() {
      localStorage.setItem(store.combos, JSON.stringify(state.combos));
    }
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((error) => {
          console.log("Service Worker registration failed:", error);
        });
      });
    }
  </script>
</body>
</html>
